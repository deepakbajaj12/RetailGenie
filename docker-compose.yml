version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retailgenie-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - HOST=0.0.0.0
      - PORT=5000
      - JWT_SECRET_KEY=retailgenie-super-secret-jwt-key-2026
      - SECRET_KEY=retailgenie-flask-secret-key
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: retailgenie-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
