repos:
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=88']
        exclude: 'venv/|migrations/'

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--ignore=E203,W503,F401,E501,F841,E722,F821,F541,E231,F811,W293']
        exclude: 'venv/|migrations/'

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--no-strict-optional', '--exclude=backend/app.py']
        exclude: 'venv/|migrations/|tests/|^app\.py$|^backend/app\.py$'
        additional_dependencies: [types-requests, types-redis]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: 'venv/'
      - id: end-of-file-fixer
        exclude: 'venv/'
      - id: check-yaml
        exclude: 'venv/'
      - id: check-added-large-files
        exclude: 'venv/'
      - id: check-merge-conflict
      - id: debug-statements
        exclude: 'venv/'

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=88']
        exclude: 'venv/|migrations/|api_versions/|controllers/|middleware/|monitoring/|database/|config/|ml_models/|websocket_app\.py|tests/test_.*\.py'

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        args: ['backend/tests/', '--tb=short']
        exclude: 'venv/'
